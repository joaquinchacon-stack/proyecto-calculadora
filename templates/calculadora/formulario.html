<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cámaras</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h2 { color: #2c5d5d; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { background: #2c5d5d; color: white; padding: 12px; border: none; border-radius: 4px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #1e4242; }
    </style>
</head>
<body>
<div class="container">
    <h2>Calculadora de Cobertura</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre de la Góndola / Pasillo:</label>
            <input type="text" name="nombre" required>
        </div>
        <div class="form-group">
            <label>Largo de la Góndola (m):</label>
            <input type="number" name="largo_gondola" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Base Mayor del Trapecio (m):</label>
            <input type="number" name="base_mayor" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Base Menor / Cobertura Útil (m):</label>
            <input type="number" name="base_menor" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Altura Enfocada (m):</label>
            <input type="number" name="altura_gondola" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Solape Requerido (m):</label>
            <input type="number" name="solape" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Distancia a Cabecera (m):</label>
            <input type="number" name="distancia_cabecera" step="0.01" value="0.5">
        </div>
        <button type="submit" class="btn">Calcular Distribución</button>
    </form>
</div>
</body>
</html>
